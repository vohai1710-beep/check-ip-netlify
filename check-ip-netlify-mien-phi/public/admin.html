<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý IP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="wrap wide">
    <section class="hero card">
      <div>
        <p class="eyebrow">Admin</p>
        <h1>Quản lý IP 64 máy</h1>
        <p class="muted">Máy online bị trùng IP sẽ được tô đỏ.</p>
      </div>
      <a class="admin-link" href="/">Trang máy</a>
    </section>

    <section id="loginCard" class="card">
      <h2>Đăng nhập quản lý</h2>
      <p class="muted">Nhập mật khẩu ADMIN_PASSWORD bạn đặt trong Netlify.</p>
      <form id="loginForm" class="form-row">
        <input id="passwordInput" type="password" placeholder="Mật khẩu quản lý" autocomplete="current-password">
        <button type="submit">Vào quản lý</button>
      </form>
      <div id="loginMessage" class="message hidden"></div>
    </section>

    <section id="adminPanel" class="hidden">
      <section class="grid four">
        <div class="card metric"><span>Tổng máy</span><b id="totalCount">0</b></div>
        <div class="card metric"><span>Online</span><b id="onlineCount">0</b></div>
        <div class="card metric"><span>IP online riêng</span><b id="uniqueIpCount">0</b></div>
        <div class="card metric danger-metric"><span>Máy trùng IP</span><b id="dupCount">0</b></div>
      </section>

      <section class="card">
        <div class="toolbar">
          <div>
            <h2>Danh sách máy</h2>
            <p id="refreshInfo" class="muted small">Chưa tải dữ liệu.</p>
          </div>
          <div class="button-row right">
            <button id="refreshBtn" class="secondary" type="button">Làm mới</button>
            <button id="exportBtn" class="secondary" type="button">Xuất CSV</button>
            <button id="logoutBtn" class="secondary" type="button">Đăng xuất</button>
            <button id="resetBtn" class="danger" type="button">Xóa toàn bộ</button>
          </div>
        </div>
        <div id="adminWarning" class="message warn hidden"></div>
        <div id="dupGroups" class="dup-groups"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tên máy</th>
                <th>IP public</th>
                <th>Trạng thái</th>
                <th>Trùng với</th>
                <th>Lần cuối</th>
                <th>Mã máy</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="deviceRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="/admin.js" type="module"></script>
</body>
</html>
